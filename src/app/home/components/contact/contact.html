<section class="contact-section" id="contact">
    <div class="container">
        <div class="section-header">
            <span class="section-label">Contact</span>
            <h2 class="section-title">Entrez en Contact</h2>
            <p class="section-description">N'hésitez pas à me contacter pour discuter de nouveaux projets ou collaborations</p>
        </div>

        <div class="contact-content">
            <div class="contact-info-grid">
                <div class="contact-info-card">
                    <div class="contact-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <h4>Email</h4>
                    <a href="mailto:kodjoandre56@gmail.com">kodjoandre56@gmail.com</a>
                </div>

                <div class="contact-info-card">
                    <div class="contact-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </div>
                    <h4>Téléphone</h4>
                    <a href="tel:+2250703255471">+225 0703255471</a>
                </div>

                <div class="contact-info-card">
                    <div class="contact-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <h4>Localisation</h4>
                    <p>GRAND-BASSAM, CI</p>
                </div>
            </div>

            <form class="contact-form" id="contact-form">
                <div class="form-grid">
                    <div class="form-group">
                        <input type="text" name="name" id="name" class="form-input" placeholder=" " required>
                        <label for="name" class="form-label">Nom Complet</label>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" id="email" class="form-input" placeholder=" " required>
                        <label for="email" class="form-label">Email</label>
                    </div>
                </div>
                <div class="form-group">
                    <input type="text" name="subject" id="subject" class="form-input" placeholder=" " required>
                    <label for="subject" class="form-label">Sujet</label>
                </div>
                <div class="form-group">
                    <textarea name="message" id="message" class="form-input" rows="6" placeholder=" " required></textarea>
                    <label for="message" class="form-label">Message</label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span>Envoyer le message</span>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="margin-left: 8px;">
                        <path d="M18 2L9 11M18 2l-7 16-3-7-7-3 16-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</section>
